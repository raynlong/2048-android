name: Build Python APK (Buildozer)

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]
    paths:
      - 'python_src/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK via Buildozer (arm64-v8a)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-dev \
            build-essential \
            git \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            openjdk-17-jdk-headless \
            zip \
            unzip

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            python_src/.buildozer
          key: buildozer-v6-${{ hashFiles('python_src/buildozer.spec', 'python_src/main.py', 'python_src/src/ui.py', 'python_src/src/audio_manager.py', 'python_src/src/dark_mode.py') }}
          restore-keys: |
            buildozer-v6-

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.37

      - name: Verify buildozer & source layout
        working-directory: python_src
        run: |
          echo "=== Buildozer version ==="
          buildozer version
          echo "=== Source files ==="
          ls -la
          ls -la src/
          echo "=== Python syntax check ==="
          python3 -c "import ast; [ast.parse(open(f,encoding='utf-8').read()) for f in ['main.py','src/__init__.py','src/constants.py','src/grid.py','src/tile.py','src/game_manager.py','src/storage.py','src/audio_manager.py','src/dark_mode.py','src/ui.py']]"
          echo "All syntax checks passed"

      - name: Build APK
        working-directory: python_src
        run: |
          unset ANDROID_HOME ANDROID_SDK_ROOT ANDROID_NDK ANDROID_NDK_HOME ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          buildozer android clean 2>&1 || true
          buildozer android debug 2>&1 | tee build.log
          echo "=== Build exit code: $? ==="
          echo "=== Checking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND"
          echo "=== .buildozer dists structure ==="
          find .buildozer/android/platform -name "*.apk" -o -name "dists" -type d 2>/dev/null | head -20
        timeout-minutes: 90

      - name: Locate and copy APK
        if: success()
        run: |
          echo "=== Searching for .apk files recursively ==="
          APKS=$(find . -name "*.apk" -type f 2>/dev/null)
          if [ -z "$APKS" ]; then
            echo "ERROR: No .apk file found anywhere!"
            echo "=== Full .buildozer tree ==="
            find python_src/.buildozer -maxdepth 5 -type d 2>/dev/null | head -50
            exit 1
          fi
          echo "Found APKs:"
          echo "$APKS"
          mkdir -p python_src/bin
          for apk in $APKS; do
            cp "$apk" python_src/bin/
          done
          echo "=== bin/ contents ==="
          ls -la python_src/bin/

      - name: Upload build log (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: buildozer-build-log
          path: python_src/build.log
          retention-days: 7

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: 2048-python-debug
          path: python_src/bin/*.apk
          if-no-files-found: error
          retention-days: 30
