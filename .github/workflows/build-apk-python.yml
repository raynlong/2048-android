name: Build Python APK (Buildozer)

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [main]
    paths:
      - 'python_src/**'  # Only run when Python source changes

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK via Buildozer (arm64-v8a)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-dev \
            build-essential \
            git \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            openjdk-17-jdk-headless \
            zip \
            unzip

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            python_src/.buildozer
          key: buildozer-v4-${{ hashFiles('python_src/buildozer.spec') }}
          restore-keys: |
            buildozer-v4-

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Build APK
        working-directory: python_src
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          # Unset system Android SDK to avoid conflicts
          unset ANDROID_HOME ANDROID_SDK_ROOT ANDROID_NDK ANDROID_NDK_HOME ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          buildozer android debug
        timeout-minutes: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: 2048-python-debug
          path: python_src/bin/*.apk
          retention-days: 30
